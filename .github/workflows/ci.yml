name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test & build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test with coverage (enforces threshold)
        run: npm run coverage

      - name: Check generated badges
        run: npm run badges:check

      - name: Build npm bundle
        run: npm run bundle

      - name: Build Chrome Web Store zip
        run: npm run build

      - name: Upload extension zip
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v7
        with:
          name: logoturtle-extension
          path: dist/*.zip
          if-no-files-found: error
