name: Language Badge

on:
  push:
    branches: [master, main]
    paths:
      - "**/*.css"
      - "**/*.html"
      - "**/*.js"
      - "scripts/generate-language-badge.js"
      - ".github/workflows/language-badge.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: language-badge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    name: Update JavaScript badge
    runs-on: ubuntu-latest
    if: github.repository == 'DoctorLai/LogoTurtle'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Generate badge
        run: npm run badges

      - name: Commit badge update
        run: |
          if git diff --quiet -- badges/javascript.json; then
            echo "Language badge is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/javascript.json
          git commit -m "chore: update language badge"
          git push
